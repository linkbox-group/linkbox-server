services:
  nats:
    image: nats
    container_name: nats-server
    ports:
      - "4222:4222"
      - "8222:8222"
    command: -DV
    restart: always
  consul:
    image: "consul:1.15.4"
    network_mode: host
    ports:
      - "8500:8500"

  mysql:
    image: 'mysql:8'
    ports:
      - 3306:3306
    environment:
      - MYSQL_ROOT_PASSWORD=root
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./mysql/conf:/etc/mysql/conf.d
  redis:
    image: 'redis:latest'
    ports:
      - 6379:6379

    command: redis-server --requirepass 123456
  linkbox-ai:
    image: "xyq777/linkbox-ai"
    ports:
      - 8080:8080
    volumes:
      - ./config/ai.toml:/app/configs/test/conf.toml